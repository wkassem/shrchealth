<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SHRC App Routes</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #0f172a;
      }
      main {
        max-width: 720px;
        padding: 32px;
        text-align: center;
      }
      h1 {
        margin-bottom: 12px;
      }
      p {
        line-height: 1.6;
        color: #475569;
      }
      ul {
        list-style: none;
        padding: 0;
        margin: 24px 0 0;
        display: grid;
        gap: 12px;
      }
      a {
        display: block;
        padding: 14px 18px;
        border-radius: 12px;
        text-decoration: none;
        background: white;
        border: 1px solid #cbd5e1;
        color: #0f172a;
        font-weight: 600;
      }
      a:hover {
        border-color: #2563eb;
        color: #2563eb;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>SHRC Pages</h1>
      <p>Select one of the available pages below.</p>
      <ul>
        <li><a href="/">Open Home (App.jsx)</a></li>
        <li><a href="/app">Open App.jsx Preview</a></li>
        <li><a href="/app1">Open App1.jsx Preview</a></li>
      </ul>
    </main>
  </body>
</html>
